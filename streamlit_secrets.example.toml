# Copy these values into Streamlit Cloud > Manage app > Settings > Secrets.
# For local testing, copy this file to .streamlit/secrets.toml and fill it in.

[auth]
# Local:
redirect_uri = "http://localhost:8501/oauth2callback"

# Streamlit Cloud:
# redirect_uri = "https://ai-cv-analyzerr.streamlit.app/oauth2callback"

cookie_secret = "replace-with-a-long-random-secret"

[auth.google]
client_id = "your-google-oauth-client-id"
client_secret = "your-google-oauth-client-secret"
server_metadata_url = "https://accounts.google.com/.well-known/openid-configuration"

# Optional if you keep the GitHub/Facebook buttons through Auth0.
[auth.auth0]
client_id = "your-auth0-client-id"
client_secret = "your-auth0-client-secret"
server_metadata_url = "https://YOUR-AUTH0-DOMAIN/.well-known/openid-configuration"
