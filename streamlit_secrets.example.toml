# Copy these values into Streamlit Cloud > Manage app > Settings > Secrets.
# For local testing, copy this file to .streamlit/secrets.toml and fill it in.
# Never commit real client secrets, app passwords, or cookie secrets.

# Use an external PostgreSQL database in production so users are not lost
# when Streamlit Cloud reboots or redeploys the app.
DATABASE_URL = "postgresql://USER:PASSWORD@HOST:5432/DATABASE?sslmode=require"

[auth]
# Streamlit Community Cloud callback:
redirect_uri = "https://ai-cv-analyzerr.streamlit.app/~/+/oauth2callback"

# Local testing only:
# redirect_uri = "http://localhost:8501/oauth2callback"

cookie_secret = "replace-with-a-long-random-secret"

[auth.google]
client_id = "your-google-oauth-client-id"
client_secret = "your-google-oauth-client-secret"
server_metadata_url = "https://accounts.google.com/.well-known/openid-configuration"

# Optional: GitHub and Facebook through Auth0.
# In Auth0, enable the GitHub and Facebook social connections for the same app.
# The connection names below are Auth0 defaults; check Authentication > Social
# if you renamed them.
# [auth.github]
# client_id = "your-auth0-application-client-id"
# client_secret = "your-auth0-application-client-secret"
# server_metadata_url = "https://YOUR_AUTH0_DOMAIN/.well-known/openid-configuration"
# client_kwargs = { "connection" = "github" }
#
# [auth.facebook]
# client_id = "your-auth0-application-client-id"
# client_secret = "your-auth0-application-client-secret"
# server_metadata_url = "https://YOUR_AUTH0_DOMAIN/.well-known/openid-configuration"
# client_kwargs = { "connection" = "facebook" }
